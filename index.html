<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ارتباط با من — ارسال پیام</title>
  <meta name="description" content="صفحهٔ تماس - فرم پیام یک‌صفحه‌ای" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg1:#0f1724;
      --bg2:#2b2f66;
      --card:#0f1724aa;
      --accent:#7c5cff;
      --accent2:#00d4ff;
      --glass: rgba(255,255,255,0.06);
      --text:#e6eef8;
      --muted:#a8b3c9;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:"Poppins",system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;
      background: radial-gradient(800px 400px at 10% 10%, rgba(124,92,255,0.12), transparent),
                  radial-gradient(700px 350px at 90% 90%, rgba(0,212,255,0.06), transparent),
                  linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px;
    }

    /* floating blobs */
    .bg-blob{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
    .blob{
      position:absolute;
      filter: blur(48px);
      opacity:0.45;
      transform: translate3d(0,0,0);
      mix-blend-mode:screen;
    }
    .blob.a{width:380px;height:380px;background:linear-gradient(135deg,var(--accent),#b18fff);left:-80px;top:-40px;border-radius:50%}
    .blob.b{width:300px;height:300px;background:linear-gradient(135deg,var(--accent2),#6ef2ff);right:-60px;bottom:-20px;border-radius:50%}
    .blob.c{width:220px;height:220px;background:linear-gradient(135deg,#ff8aa0,var(--accent));left:10%;bottom:10%;border-radius:40%}

    .wrap{
      width:100%;
      max-width:920px;
      z-index:1;
      display:grid;
      grid-template-columns: 1fr 420px;
      gap:28px;
      align-items:center;
    }

    @media (max-width:880px){
      .wrap{grid-template-columns:1fr; padding:0 12px}
    }

    .info{
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      padding:36px;
      border-radius:18px;
      box-shadow: 0 8px 30px rgba(2,8,23,0.6);
      border: 1px solid rgba(255,255,255,0.03);
      min-height:360px;
    }
    .title{
      display:flex;
      gap:14px;
      align-items:center;
      margin-bottom:18px;
    }
    .logo{
      width:68px;height:68px;border-radius:14px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:22px;
      box-shadow: 0 6px 22px rgba(92,80,200,0.18);
    }
    h1{margin:0;font-size:22px}
    p.lead{margin-top:10px;color:var(--muted);line-height:1.6}

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      padding:28px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,0.03);
      box-shadow: 0 12px 40px rgba(2,6,22,0.6);
    }

    form{display:flex;flex-direction:column;gap:12px}
    .row{display:flex;gap:12px}
    .row .field{flex:1}
    label{display:block;color:var(--muted);font-size:13px;margin-bottom:6px}
    input[type="text"], input[type="email"], textarea{
      width:100%;
      padding:12px 14px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.04);
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      color:var(--text);
      outline:none;
      font-size:15px;
      transition:box-shadow .18s, border-color .18s, transform .08s;
      resize:vertical;
    }
    input:focus, textarea:focus{box-shadow:0 6px 18px rgba(124,92,255,0.12);border-color:rgba(124,92,255,0.65);transform:translateY(-1px)}
    textarea{min-height:140px;line-height:1.5;padding-top:14px}

    .meta{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-top:4px}
    .hint{color:var(--muted);font-size:13px}

    .btn{
      margin-top:6px;
      display:inline-flex;
      align-items:center;
      gap:10px;
      border:0;
      cursor:pointer;
      padding:12px 16px;
      border-radius:12px;
      color:white;
      font-weight:600;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      box-shadow: 0 8px 28px rgba(124,92,255,0.18);
      transition:transform .12s, box-shadow .12s, opacity .12s;
    }
    .btn:active{transform:translateY(1px)}
    .btn[disabled]{opacity:0.6;cursor:default}

    .status{
      margin-top:12px;
      font-size:14px;
      padding:10px 12px;
      border-radius:10px;
    }
    .success{background:linear-gradient(90deg, rgba(0,200,150,0.12), rgba(0,200,150,0.04)); color:#bff7e6}
    .error{background:linear-gradient(90deg, rgba(255,80,100,0.08), rgba(255,80,100,0.03)); color:#ffd6d8}

    .footer-note{margin-top:18px;color:var(--muted);font-size:13px}

    /* accessibility focus */
    input:focus-visible, textarea:focus-visible, button:focus-visible{outline:3px solid rgba(124,92,255,0.12);outline-offset:3px}
  </style>
</head>
<body>
  <div class="bg-blob" aria-hidden="true">
    <div class="blob a"></div>
    <div class="blob b"></div>
    <div class="blob c"></div>
  </div>

  <main class="wrap" role="main">
    <section class="info card" aria-labelledby="contactTitle">
      <div class="title">
        <div class="logo" aria-hidden="true">ER H</div>
        <div>
          <h1 id="contactTitle">سلام — خوش آمدی!</h1>
          <p class="lead">هر پیامی که می‌فرستی با دقت خوانده میشود.</p>
        </div>
      </div>

      <p class="footer-note">آدرس ایمیل یا شبکه‌های اجتماعی را در صورت تمایل در پیام بگذارید تا پاسخ بدهم.</p>
    </section>

    <aside class="card" aria-labelledby="formTitle">
      <h2 id="formTitle" style="margin:0 0 12px 0">ارسال پیام</h2>

      <form id="contactForm" novalidate>
        <div class="row">
          <div class="field">
            <label for="name">نام</label>
            <input id="name" name="name" type="text" placeholder="مثال: ممد" required />
          </div>
          <div class="field">
            <label for="email">ایمیل*</label>
            <input id="email" name="email" type="email" placeholder="example@domain.com" required />
          </div>
        </div>

        <div>
          <label for="message">پیام</label>
          <textarea id="message" name="message" placeholder="پیام خود را اینجا بنویسید..." required></textarea>
        </div>

        <div class="meta">
          <div class="hint">حداکثر 2000 کاراکتر</div>
          <button type="submit" class="btn" id="submitBtn">ارسال پیام</button>
        </div>

        <div id="status" aria-live="polite" style="display:none"></div>
      </form>
    </aside>
  </main>

  <script>
    // ====== تنظیم: آدرس endpoint فرم‌پست شما ======
    const FORM_ENDPOINT = "https://formspree.io/f/xgojzplr";

    const form = document.getElementById("contactForm");
    const statusEl = document.getElementById("status");
    const submitBtn = document.getElementById("submitBtn");

    function setStatus(type, text){
      statusEl.style.display = "block";
      statusEl.className = "status " + (type === "ok" ? "success" : "error");
      statusEl.textContent = text;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      statusEl.style.display = "none";
      const formData = new FormData(form);

      // client-side limit and simple validation
      if((formData.get("message")||"").length > 2000){
        setStatus("err","پیام بیش از حد طولانی است.");
        return;
      }

      if(!FORM_ENDPOINT){
        setStatus("err","آدرس endpoint فرم تنظیم نشده.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "در حال ارسال...";

      try {
        const response = await fetch(FORM_ENDPOINT, {
          method: "POST",
          headers: { 'Accept': 'application/json' },
          body: formData
        });

        if(response.ok){
          setStatus("ok","پیام شما ارسال شد — ممنون! من در اولین فرصت پاسخ خواهم داد.");
          form.reset();
        } else {
          const data = await response.json().catch(()=>null);
          const msg = (data && (data.error || data.message)) ? data.error || data.message : "خطا در ارسال پیام. لطفاً دوباره تلاش کنید.";
          setStatus("err", msg);
        }

      } catch (err){
        console.error(err);
        setStatus("err","خطا در ارتباط با سرور. اتصال اینترنت یا تنظیمات endpoint را بررسی کنید.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "ارسال پیام";
      }
    });
  </script>
</body>
</html>
